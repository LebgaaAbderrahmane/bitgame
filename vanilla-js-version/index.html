<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tiny Coder | Teach the Robot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="level-indicator">
                <span class="star-icon">★</span>
                <span id="level-title">Level 1</span>
            </div>
            <div class="game-stats">
                <span id="attempts">Attempts: 0</span>
            </div>
            <button id="hint-btn" class="icon-btn hint-btn" title="Get Hint">
                💡 Hint
            </button>
        </header>

        <!-- The Game Grid -->
        <main class="game-world">
            <div id="grid-container" class="grid-container">
                <!-- Cells will be generated by JS -->
            </div>
            <div id="instruction-banner" class="instruction-banner">
                <p id="instruction-text">Tap MOVE to go forward!</p>
            </div>
        </main>

        <!-- Program Editor -->
        <section class="program-editor">
            <div class="editor-header">
                <h3>Your Program</h3>
                <div class="editor-actions">
                    <button id="run-btn" class="primary-btn run-btn">▶ RUN</button>
                    <button id="reset-btn" class="secondary-btn reset-btn">🗑 RESET</button>
                </div>
            </div>
            <div id="program-list" class="program-list">
                <!-- Program cards will appear here -->
                <div class="empty-state">Add cards below to start coding</div>
            </div>
        </section>

        <!-- Action Palette -->
        <footer class="action-palette">
            <div class="palette-scroll" id="palette-container">
                <!-- Available cards will be listed here -->
            </div>
        </footer>

        <!-- Modals -->
        <div id="modal-container" class="modal-container hidden">
            <div class="modal-content glass">
                <div id="modal-body"></div>
                <div class="modal-footer">
                    <button class="modal-close-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="levels.js"></script>
    <script src="execution.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
